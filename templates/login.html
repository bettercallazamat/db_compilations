{% extends "base.html" %}

{% block title %}Login - Video Analytics{% endblock %}

{% block extra_css %}
<style>
  .login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
  }

  .login-card {
    background: white;
    border-radius: 15px;
    padding: 3rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 400px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-header h1 {
    color: #333;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .login-header p {
    color: #666;
    font-size: 0.9rem;
  }

  .form-floating {
    margin-bottom: 1.5rem;
  }

  .form-control {
    border-radius: 10px;
    border: 2px solid #e9ecef;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  .form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
  }

  .btn-login {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    border-radius: 10px;
    padding: 0.75rem;
    font-weight: 600;
    color: white;
    width: 100%;
    transition: all 0.3s ease;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    color: white;
  }

  .error-message {
    background-color: #f8d7da;
    border: 1px solid #f1aeb5;
    color: #721c24;
    padding: 0.75rem;
    border-radius: 10px;
    margin-bottom: 1rem;
    text-align: center;
  }

  .login-footer {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid #e9ecef;
  }

  .login-footer p {
    color: #666;
    font-size: 0.85rem;
    margin: 0;
  }

  .bi-shield-lock {
    font-size: 3rem;
    color: #667eea;
    margin-bottom: 1rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <i class="bi bi-shield-lock"></i>
      <h1>Welcome Back</h1>
      <p>Please sign in to continue</p>
    </div>

    {% if error %}
    <div class="error-message">
      <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-floating">
        <input
          type="text"
          class="form-control"
          id="username"
          name="username"
          placeholder="Username"
          required
          autofocus
        />
        <label for="username">
          <i class="bi bi-person me-2"></i>Username
        </label>
      </div>

      <div class="form-floating">
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="Password"
          required
        />
        <label for="password">
          <i class="bi bi-lock me-2"></i>Password
        </label>
      </div>

      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="login-footer">
      <p>
        <i class="bi bi-info-circle me-1"></i>
        Session expires after 60 minutes of inactivity
      </p>
    </div>
  </div>
</div>
{% endblock %}
