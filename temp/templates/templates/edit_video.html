<!-- templates/edit_video.html -->
{% extends "base.html" %}
{% block title %}Edit Video - {{ video.title }}{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Video</h1>

<form method="POST" action="{{ url_for('edit_video', video_id=video.video_id) }}">
  {{ form.hidden_tag() }}

  <div class="mb-3">
    <label for="title" class="form-label">Title</label>
    <input type="text" name="title" id="title" class="form-control" value="{{ video.title }}" required>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea name="description" id="description" rows="6" class="form-control"
      required>{{ video.description }}</textarea>
  </div>

  <div class="mb-3">
    <label for="tags" class="form-label">Tags (comma-separated)</label>
    <input type="text" name="tags" id="tags" class="form-control" value="{{ video.tags | join(', ') }}">
  </div>

  <div class="mb-3">
    <label for="published_at" class="form-label">Published Date</label>
    <input type="date" name="published_at" id="published_at" class="form-control" value="{{ video.published_at }}">
  </div>

  <div class="mb-3">
    <label for="duration" class="form-label">Duration (MM:SS)</label>
    <input type="text" name="duration" id="duration" class="form-control" value="{{ video.duration }}">
  </div>

  <div class="mb-3">
    <label for="view_count" class="form-label">Views</label>
    <input type="number" name="view_count" id="view_count" class="form-control" value="{{ video.view_count }}">
  </div>

  <div class="mb-3">
    <label for="like_count" class="form-label">Likes</label>
    <input type="number" name="like_count" id="like_count" class="form-control" value="{{ video.like_count }}">
  </div>

  <div class="mb-3">
    <label for="comment_count" class="form-label">Comments</label>
    <input type="number" name="comment_count" id="comment_count" class="form-control" value="{{ video.comment_count }}">
  </div>

  <div class="form-check mb-3">
    <input type="checkbox" name="is_compilation" id="is_compilation" class="form-check-input" {% if video.is_compilation
      %}checked{% endif %}>
    <label for="is_compilation" class="form-check-label">This is a compilation</label>
  </div>

  <div class="form-check mb-4">
    <input type="checkbox" name="actor" id="actor" class="form-check-input" {% if video.actor %}checked{% endif %}>
    <label for="actor" class="form-check-label">Actor Appears</label>
  </div>

  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('video_detail', video_id=video.video_id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
